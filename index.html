<style>
  :root {
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --accent: #00E5FF;
    --red: #FF3B3B;
    --bg: #060A0F;
    --bg2: #0C1520;
    --bg3: #111E2E;
    --border: rgba(0,229,255,0.15);
    --text: #E0EAF5;
    --muted: #4A6080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.6s ease both;
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    letter-spacing: 6px;
    line-height: 0.9;
    color: white;
    text-shadow: 0 0 60px rgba(0,229,255,0.3), 0 0 120px rgba(0,229,255,0.1);
  }

  .header h1 span {
    color: var(--accent);
  }

  .header-sub {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 14px;
    text-transform: uppercase;
  }

  .total-score {
    display: inline-block;
    margin-top: 20px;
    background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(0,229,255,0.05));
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .total-score span {
    color: white;
    font-size: 16px;
  }

  .header-meta {
    margin-top: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .meta-time { color: rgba(0,229,255,0.6); }
  .meta-sep { margin: 0 6px; opacity: 0.4; }
  .meta-from { color: rgba(255,255,255,0.35); }

  /* SERVER RANKINGS */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-left: 4px;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
  }

  .server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 50px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .server-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .server-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.04), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .server-card:hover::before { opacity: 1; }
  .server-card:hover { border-color: rgba(0,229,255,0.35); transform: translateY(-1px); }

  .server-card.rank-1 { border-color: rgba(255,215,0,0.4); background: linear-gradient(135deg, rgba(255,215,0,0.08), var(--bg2)); }
  .server-card.rank-2 { border-color: rgba(192,192,192,0.3); background: linear-gradient(135deg, rgba(192,192,192,0.06), var(--bg2)); }
  .server-card.rank-3 { border-color: rgba(205,127,50,0.3); background: linear-gradient(135deg, rgba(205,127,50,0.06), var(--bg2)); }

  .server-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .rank-1 .server-rank { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .rank-2 .server-rank { color: var(--silver); }
  .rank-3 .server-rank { color: var(--bronze); }
  .server-card:not(.rank-1):not(.rank-2):not(.rank-3) .server-rank { color: var(--muted); }

  .server-info { flex: 1; min-width: 0; }

  .server-id {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: white;
    letter-spacing: 2px;
    line-height: 1;
  }

  .server-id span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    display: block;
    margin-bottom: 2px;
    font-weight: normal;
  }

  .server-pts {
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .server-pts-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .search-box {
    flex: 1;
    min-width: 180px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 4px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* TABLE */
  .table-wrap {
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .player-table {
    width: 100%;
    border-collapse: collapse;
  }

  .player-table thead tr {
    border-bottom: 2px solid rgba(0,229,255,0.2);
  }

  .player-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  .player-table th:hover { color: var(--accent); }
  .player-table th.sorted { color: var(--accent); }

  .player-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
    animation: rowIn 0.3s ease both;
  }

  .player-table tbody tr:hover {
    background: rgba(0,229,255,0.04);
  }

  .player-table td {
    padding: 10px 12px;
    font-size: 14px;
    vertical-align: middle;
  }

  /* Rank badge */
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    border-radius: 3px;
  }

  .rank-badge.top1 { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.4); }
  .rank-badge.top2 { background: rgba(192,192,192,0.1); color: var(--silver); border: 1px solid rgba(192,192,192,0.3); }
  .rank-badge.top3 { background: rgba(205,127,50,0.1); color: var(--bronze); border: 1px solid rgba(205,127,50,0.3); }
  .rank-badge.top10 { color: rgba(255,100,100,0.9); background: rgba(255,50,50,0.05); border: 1px solid rgba(255,50,50,0.2); }
  .rank-badge.normal { color: var(--muted); background: transparent; border: 1px solid rgba(255,255,255,0.06); }
  .rank-badge.inactive { color: var(--muted); opacity: 0.4; }

  /* Player name */
  .player-name {
    font-weight: 600;
    font-size: 15px;
    color: white;
    letter-spacing: 0.3px;
  }

  .player-name.inactive { color: var(--muted); opacity: 0.5; font-weight: 400; }

  /* Alliance tag */
  .alliance-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 600;

  .tag-S2AK { background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.25); }
  .tag-AKS1 { background: rgba(255,160,0,0.12); color: #FFA000; border: 1px solid rgba(255,160,0,0.25); }
  .tag-AKS2 { background: rgba(100,220,100,0.1); color: #64DC64; border: 1px solid rgba(100,220,100,0.2); }
  .tag-AKS3 { background: rgba(200,100,255,0.1); color: #C864FF; border: 1px solid rgba(200,100,255,0.2); }
  .tag-RP { background: rgba(255,80,80,0.1); color: #FF5050; border: 1px solid rgba(255,80,80,0.2); }
  .tag-none { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }

  .pts-cell {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    text-align: right;
  }

  .pts-high { color: var(--gold); }
  .pts-mid { color: #88BBDD; }
  .pts-low { color: var(--muted); }
  .pts-zero { color: var(--muted); opacity: 0.3; }

  /* Progress bar */
  .pts-bar {
    height: 2px;
    background: var(--bg3);
    border-radius: 1px;
    margin-top: 4px;
    overflow: hidden;
  }

  .pts-bar-fill {
    height: 100%;
    border-radius: 1px;
    background: linear-gradient(90deg, var(--accent), rgba(0,229,255,0.3));

  /* Stats footer */
  .stats-footer {
    margin-top: 30px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .stat-pill {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stat-pill strong {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
  }

  .count-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-left: 10px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes rowIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

  @media (max-width: 600px) {
    .player-table th:nth-child(3),
    .player-table td:nth-child(3) { display: none; }
  }
</style>

const maxPts = Math.max(...players.map(p=>p.pts));

// Render server grid
const serverGrid = document.getElementById('serverGrid');
servers.forEach((s,i) => {
  const cls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
  serverGrid.innerHTML += `
    <div class="server-card ${cls}">
      <div class="server-rank">#${s.rank}</div>
      <div class="server-info">
        <div class="server-id"><span>SERVER</span>${s.id}</div>
        <div class="server-pts">${s.pts.toLocaleString()}</div>
        <div class="server-pts-label">điểm</div>
      </div>
    </div>`;
});

// State
let currentFilter = 'all';
let currentSort = 'rank';
let sortDir = 1;
let searchVal = '';

function getRankClass(r) {
  if(r===1) return 'top1';
  if(r===2) return 'top2';
  if(r===3) return 'top3';
  if(r<=10) return 'top10';
  if(r===999) return 'inactive';
  return 'normal';
}

function getPtsClass(pts) {
  if(pts===0) return 'pts-zero';
  if(pts>=1000000) return 'pts-high';
  if(pts>=200000) return 'pts-mid';
  return 'pts-low';
}

function getAllianceClass(a) {
  if(!a) return 'tag-none';
  if(a==='R-P') return 'tag-RP';
  return 'tag-'+a;
}

function render() {
  let data = [...players];

  // Filter
  if(currentFilter==='active') data = data.filter(p=>p.pts>0);
  else if(currentFilter!=='all') data = data.filter(p=>p.alliance===currentFilter);

  // Search
  if(searchVal) data = data.filter(p=>p.name.toLowerCase().includes(searchVal.toLowerCase()));

  // Sort
  data.sort((a,b)=>{
    let v = 0;
    if(currentSort==='rank') v=a.rank-b.rank;
    else if(currentSort==='name') v=a.name.localeCompare(b.name);
    else if(currentSort==='alliance') v=a.alliance.localeCompare(b.alliance);
    else if(currentSort==='pts') v=b.pts-a.pts;
    return v * sortDir;
  });

  document.getElementById('countBadge').textContent = `[${data.length}]`;

  const tbody = document.getElementById('playerBody');
  tbody.innerHTML = data.map((p,i) => {
    const rk = getRankClass(p.rank);
    const isInactive = p.rank===999;
    const barW = p.pts>0 ? Math.round((p.pts/maxPts)*100) : 0;
    return `<tr style="animation-delay:${i*0.012}s">
      <td><span class="rank-badge ${rk}">${p.rank===999?'—':p.rank}</span></td>
      <td><span class="player-name ${isInactive?'inactive':''}">${p.name}</span></td>
      <td><span class="alliance-tag ${getAllianceClass(p.alliance)}">${p.alliance||'—'}</span></td>
      <td class="pts-cell">
        <span class="${getPtsClass(p.pts)}">${p.pts>0?p.pts.toLocaleString():'—'}</span>
        <div class="pts-bar"><div class="pts-bar-fill" style="width:${barW}%"></div></div>
      </td>
    </tr>`;
  }).join('');

  // Stats
  const active = players.filter(p=>p.pts>0);
  const s2ak = players.filter(p=>p.alliance==='S2AK'&&p.pts>0);
  const s2akTotal = s2ak.reduce((a,p)=>a+p.pts,0);
  document.getElementById('statsFooter').innerHTML = `
    <div class="stat-pill">Người Chơi <strong>${players.length}</strong></div>
    <div class="stat-pill">Đang HĐ <strong>${active.length}</strong></div>
    <div class="stat-pill">S2AK <strong>${s2ak.length}</strong> thành viên</div>
    <div class="stat-pill">S2AK Điểm <strong>${s2akTotal.toLocaleString()}</strong></div>
    <div class="stat-pill">Hạng 1 <strong>${players.find(p=>p.rank===1)?.name||'—'}</strong></div>
  `;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Search
document.getElementById('searchBox').addEventListener('input', e => {
  searchVal = e.target.value;
  render();
});

// Sort
document.querySelectorAll('.player-table th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    document.querySelectorAll('.player-table th').forEach(t=>t.classList.remove('sorted'));
    if(currentSort===th.dataset.sort) sortDir*=-1;
    else { currentSort=th.dataset.sort; sortDir=1; }
    th.classList.add('sorted');
    render();
  });
});

render();
</script>
